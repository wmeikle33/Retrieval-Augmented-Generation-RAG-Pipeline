runtime: python311

entrypoint: gunicorn -k uvicorn.workers.UvicornWorker main:app

instance_class: F2

env_variables:
  OPENAI_MODEL: "gpt-4o-mini"
  EMBEDDING_MODEL: "text-embedding-3-small"
  VECTOR_DB: "pinecone"
  PINECONE_INDEX: "docs-index"

automatic_scaling:
  min_instances: 1
  max_instances: 5
  target_cpu_utilization: 0.65

handlers:
- url: /.*
  script: auto
  secure: always
